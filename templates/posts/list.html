{% extends 'base.html' %}

{% block title %}
    Posts
{% endblock %}

{% block content %}
    <div class="flex w-3/5 mt-8 ml-8 p-5 bg-[#1e293b] rounded-lg shadow-md text-[#94a3b8]">
        <div class="flex flex-col gap-4">
            <h1 class="text-lg font-bold text-[#ffffff]">All posts</h1>
            <div>
                <ul class="grid grid-cols-4 gap-4">
                    {% for post in posts %}
                        <div class="bg-[rgba(255,255,255,0.05)] rounded-lg mb-4 py-2 border-[rgba(255,255,255,0.1)] shadow-sm">
                            <li class="p-5 pl-5 py-3 text-[#ffffff]">{{post.id}} - {{post.title}} - {{post.status}}</li>
                            <a class="px-5 py-2 text-blue-500 hover:underline" href="{% url 'post_detail' post.id %}">Continue Reading</a>
                        </div>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
{% endblock %}
