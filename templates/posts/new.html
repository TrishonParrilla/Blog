{% extends 'base.html' %}
{% load crispy_forms_tags%}

{% block title %}
    Create Post
{% endblock %}

{% block content %}
<div class="flex w-2/5 mx-auto mt-20 p-4 bg-[#1e293b] rounded-lg shadow-md text-[#94a3b8]">
    <div class="flex flex-col gap-6 w-full">
        <h1 class="text-xl font-bold text-white">New Post</h1>
        <form method="post" class="flex flex-col gap-4">
            {% csrf_token %}

            <div class="flex flex-col gap-1">
                <label class="text-sm font-medium text-[#94a3b8]">Title</label>
                <input type="text" name="title" maxlength="128" required
                    class="bg-[#0f172a] text-white rounded-md px-4 py-2 border border-[#334155] focus:outline-none focus:border-blue-500">
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm font-medium text-[#94a3b8]">Subtitle</label>
                <input type="text" name="subtitle" maxlength="256" required
                    class="bg-[#0f172a] text-white rounded-md px-4 py-2 border border-[#334155] focus:outline-none focus:border-blue-500">
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm font-medium text-[#94a3b8]">status</label>
                <select name="status" class="bg-[#0f172a] text-white rounded-md px-4 py-2 border border-[#334155] focus:outline-none focus:border-blue-500">
                {% for status in form.status.field.queryset %}
                    <option value="{{ status.pk }}">{{ status.name }}</option>
                {% endfor %}
                </select>
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm font-medium text-[#94a3b8]">Body</label>
                <textarea name="body" rows="6" required
                    class="bg-[#0f172a] text-white rounded-md px-4 py-2 border border-[#334155] focus:outline-none focus:border-blue-500 resize-none"></textarea>
            </div>

            <button type="submit"
                class="mt-2 bg-blue-600 hover:bg-blue-500 text-white font-medium px-6 py-2 rounded-md transition duration-200 self-start hover:cursor-pointer">
                Create Post
            </button>
        </form>
    </div>
</div>
{% endblock %}
