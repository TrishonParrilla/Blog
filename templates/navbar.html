{% block navbar %}
<nav class="bg-gray-800 text-gray-300 px-8 py-2 flex items-center gap-2 shadow-xl">
  <a class="font-bold text-white text-xl mr-6 hover:text-blue-400 transition duration-200" href="{% url 'home' %}">Drafty</a>
  <a class="px-4 py-2 rounded-md text-md font-medium hover:bg-gray-700 hover:text-white transition duration-200" href="{% url 'about' %}">About</a>
  <a class="px-4 py-2 rounded-md text-md font-medium hover:bg-gray-700 hover:text-white transition duration-200" href="{% url 'contact' %}">Contact</a>
  <a class="px-4 py-2 rounded-md text-md font-medium hover:bg-gray-700 hover:text-white transition duration-200" href="{% url 'post_list' %}">Posts</a>
  {% if user.is_authenticated %}
    <a class="px-4 py-2 rounded-md text-md font-medium bg-blue-600 text-white hover:bg-blue-500 transition duration-200" href="{% url 'post_new' %}">+ New Post</a>
  {% endif %}
  <div class="ml-auto flex items-center gap-2">
    {% if user.is_authenticated %}
      <div class="ml-auto text-lg text-gray-400 mx-4"> {{ user.username }}</div>
    {% endif %}
    
    {% if user.is_authenticated %}
      <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <input type="submit" value="Log out" class="px-2 py-1 rounded-md bg-red-500/70 text-md font-medium hover:bg-red-500/90 hover:text-white transition duration-200 cursor-pointer">
      </form>
    {% else %}
      <a class="px-2 py-1 rounded-md bg-amber-600/80 text-md font-medium hover:bg-amber-600 hover:text-white transition duration-200" href="{% url 'signup' %}">Sign Up</a>
      <a class="px-2 py-1 rounded-md bg-green-600/70 text-md font-medium hover:bg-green-500/90 hover:text-white transition duration-200" href="{% url 'login' %}">Login</a>

    {% endif %}
    
  </div>
</nav>
{% endblock %}
