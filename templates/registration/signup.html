{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}
    Sign Up
{% endblock %}

{% block content %}
    <div class="bg-gray-800  max-w-md mx-auto mt-10 p-6 rounded-lg shadow-lg">
        <h1 class="text-white text-2xl mb-4">Sign Up</h1>
        <form class="text-[#94a3b8]" method='post'>
            {% csrf_token %}
            {{ form|crispy }}
            <input type="submit" value="Sign Up" class="my-2 px-3 py-1 bg-amber-500 text-white rounded-lg hover:bg-amber-600 cursor-pointer">
        </form>
    </div>

{% endblock %}
